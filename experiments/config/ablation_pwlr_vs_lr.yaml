experiment_name: phasewall_additive_ablation_pwlr_vs_lr
matrix:
  functions: [sphere, rosenbrock, rastrigin, ellipsoid_cond1e6]
  dimensions: [10, 20, 40]
  noise_sigmas: [0.0, 0.1, 0.2]
methods:
  - lr_adapt_proxy
  - phasewall_plus_lr_tuned
budget:
  evals_per_run: 1000
cma:
  initial_sigma: 2.0
  base_popsize: 10
  verbose: -9
phasewall:
  fixed_strengths:
    lr_adapt_proxy: 0.0
    phasewall_plus_lr_tuned: 0.1
lr_adapt_proxy:
  enabled: true
  ema_alpha: 0.2
  snr_up_threshold: 0.25
  snr_down_threshold: 0.08
  sigma_up_factor: 1.03
  sigma_down_factor: 0.90
  sigma_min_ratio: 0.10
  sigma_max_ratio: 10.0
seeds:
  eval: [1000, 1001, 1002, 1003, 1004, 1005, 1006, 1007, 1008, 1009,
         1010, 1011, 1012, 1013, 1014, 1015, 1016, 1017, 1018, 1019,
         1020, 1021, 1022, 1023, 1024, 1025, 1026, 1027, 1028, 1029,
         1030, 1031, 1032, 1033, 1034, 1035, 1036, 1037, 1038, 1039,
         1040, 1041, 1042, 1043, 1044, 1045, 1046, 1047, 1048, 1049,
         1050, 1051, 1052, 1053, 1054, 1055, 1056, 1057, 1058, 1059,
         1060, 1061, 1062, 1063, 1064, 1065, 1066, 1067, 1068, 1069,
         1070, 1071, 1072, 1073, 1074, 1075, 1076, 1077, 1078, 1079,
         1080, 1081, 1082, 1083, 1084, 1085, 1086, 1087, 1088, 1089,
         1090, 1091, 1092, 1093, 1094, 1095, 1096, 1097, 1098, 1099]
runtime:
  parallel_workers: 8
